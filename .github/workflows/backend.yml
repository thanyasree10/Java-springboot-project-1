name: Backend to EC2

on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      
      - name: Build and SonarQube Scan
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn clean verify sonar:sonar \
            -DskipTests \
            -Dsonar.projectKey=backend \
            -Dsonar.projectName=backend \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.token=$SONAR_TOKEN
      
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        with:
          scanMetadataReportFile: backend/target/sonar/report-task.txt
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Prepare EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            sudo yum install -y git maven java-17-amazon-corretto

      - name: Clone / Pull Repository
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            APP_DIR=/home/ec2-user/app
            REPO_NAME=Java-springboot-project
            REPO_URL=https://github.com/CloudTechDevOps/Java-springboot-project.git
            mkdir -p $APP_DIR
            cd $APP_DIR
            if [ -d "$REPO_NAME/.git" ]; then
              cd $REPO_NAME
              git reset --hard
              git pull origin main
            else
              git clone $REPO_URL
              cd $REPO_NAME
            fi

      - name: Build Maven Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/app/Java-springboot-project/backend
            mvn clean package -DskipTests -U

      - name: Stop Old Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script_stop: false
          script: |
            PID=$(ps -ef | grep '[d]atastore-0.0.7.jar' | awk '{print $2}')
      
            if [ -z "$PID" ]; then
              echo "Application is not running."
              exit 0
            fi
      
            echo "Stopping PID: $PID"
            kill -15 $PID
            sleep 5
      
            if ps -p $PID > /dev/null 2>&1; then
              echo "Force killing PID: $PID"
              kill -9 $PID
            fi
      
            echo "Application stopped."

      - name: Start Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            LOG_DIR=/var/log/app
            sudo mkdir -p $LOG_DIR
            sudo chown ec2-user:ec2-user $LOG_DIR
            cd /home/ec2-user/app/Java-springboot-project/backend/target
            nohup env \
              MYSQL_HOST=${{ secrets.DB_HOST }} \
              MYSQL_PORT=3306 \
              MYSQL_USERNAME=${{ secrets.DB_USERNAME }} \
              MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }} \
              LOG_FILE_PATH=$LOG_DIR/datastore.log \
              java -jar datastore-0.0.7.jar --server.port=8084 \
              > $LOG_DIR/nohup.out 2>&1 &

      - name: Wait for App Startup
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: sleep 15

      - name: Verify Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            HEALTH=$(curl -s http://localhost:8084/actuator/health)
            echo "$HEALTH"
            [[ "$HEALTH" == *'"status":"UP"'* ]]

      - name: Send Deployment Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Backend Deployment Report - ${{ github.repository }}
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Status: ${{ job.status }}
            Actor: ${{ github.actor }}
            Workflow: ${{ github.workflow }}
            SonarQube: Completed
            Quality Gate: Passed if workflow succeeded.
