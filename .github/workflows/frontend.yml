name: Deploy Streamlit Frontend to EC2



on:
  workflow_run:
    workflows: ["Backend to EC2"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            APP_DIR=/home/ec2-user/front
            REPO_NAME=Java-springboot-project
            REPO_URL=https://github.com/CloudTechDevOps/Java-springboot-project.git

            echo "🚀 Starting deployment..."

            mkdir -p $APP_DIR
            cd $APP_DIR

            # Clone or pull latest code
            if [ -d "$REPO_NAME/.git" ]; then
              cd $REPO_NAME
              git reset --hard
              git pull origin main
            else
              git clone $REPO_URL
              cd $REPO_NAME
            fi

            # Install Python
            sudo dnf install -y python3 python3-pip

            cd frontend

            # Create virtual environment
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate

            pip install --upgrade pip
            pip install -r requirements.txt

            # 🔥 Create/Update systemd service file
            sudo tee /etc/systemd/system/frontend.service > /dev/null <<EOF
            [Unit]
            Description=Streamlit Frontend App
            After=network.target
            
            [Service]
            User=ec2-user
            WorkingDirectory=/home/ec2-user/front/Java-springboot-project/frontend
            
            ExecStart=/bin/bash -c 'source /home/ec2-user/front/Java-springboot-project/frontend/venv/bin/activate && streamlit run app.py --server.port=8501 --server.address=0.0.0.0'
            
            Environment=API_URL=http://localhost:8084
            
            Restart=always
            RestartSec=5
            
            StandardOutput=append:/home/ec2-user/frontend.log
            StandardError=append:/home/ec2-user/frontend-error.log
            
            [Install]
            WantedBy=multi-user.target
            EOF

            # Reload and restart service
            sudo systemctl daemon-reload
            sudo systemctl enable frontend
            sudo systemctl restart frontend

            echo "✅ Deployment successful"
